name: Publish crates

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix. Must match the selected vX.Y.Z tag.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: rustup show

      - name: Validate committed release version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -ne "tag") {
            throw "Publish workflow must run from a vX.Y.Z tag; got $env:GITHUB_REF_TYPE '$env:GITHUB_REF_NAME'"
          }

          $tagName = $env:GITHUB_REF_NAME
          if ($tagName -notmatch '^v(?<version>(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*))$') {
            throw "Release tag '$tagName' must match vX.Y.Z"
          }
          $tagVersion = $Matches.version

          $inputVersion = "${{ github.event.inputs.version }}"
          if (-not [string]::IsNullOrWhiteSpace($inputVersion) -and $inputVersion -ne $tagVersion) {
            throw "workflow_dispatch version '$inputVersion' does not match tag '$tagName'"
          }

          git diff --exit-code
          if ($LASTEXITCODE -ne 0) {
            throw "Release publish must run from a clean checkout"
          }

          git diff --cached --exit-code
          if ($LASTEXITCODE -ne 0) {
            throw "Release publish must run with no staged changes"
          }

          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $packages = @($metadata.packages | Where-Object { $_.publish -ne $false })
          if ($packages.Count -eq 0) {
            throw "No publishable packages found"
          }

          foreach ($package in $packages) {
            if ([string] $package.version -ne $tagVersion) {
              throw "Package $($package.name) version $($package.version) does not match release tag $tagName"
            }
          }

          Write-Host "Release tag $tagName matches committed package version $tagVersion"

      - name: Discover unpublished versions
        id: discover
        shell: pwsh
        run: |
          $packageList = Join-Path $env:RUNNER_TEMP "unpublished-crates.txt"
          New-Item -ItemType File -Force -Path $packageList | Out-Null
          Clear-Content -Path $packageList

          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $unpublishedCount = 0

          foreach ($package in $metadata.packages) {
            if ($package.publish -eq $false) {
              Write-Host "Skipping $($package.name) because publish=false"
              continue
            }

            $name = $package.name
            $version = $package.version
            $encodedName = [Uri]::EscapeDataString($name)
            $encodedVersion = [Uri]::EscapeDataString($version)
            $url = "https://crates.io/api/v1/crates/$encodedName/$encodedVersion"

            $statusCode = & curl.exe `
              --silent `
              --show-error `
              --location `
              --output NUL `
              --write-out "%{http_code}" `
              --header "User-Agent: tovli-publish-crates-github-action" `
              $url

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to query crates.io for $name $version"
            }
            $statusCode = [int] $statusCode

            if ($statusCode -eq 200) {
              Write-Host "Skipping $name $version because it is already published"
              continue
            }

            if ($statusCode -ne 404) {
              throw "Unexpected crates.io status $statusCode while checking $name $version"
            }

            Write-Host "Will publish $name $version"
            Add-Content -Path $packageList -Value $name
            $unpublishedCount++
          }

          $hasUnpublished = if ($unpublishedCount -gt 0) { "true" } else { "false" }
          "has_unpublished=$hasUnpublished" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "package_list=$packageList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Test
        if: steps.discover.outputs.has_unpublished == 'true'
        shell: pwsh
        run: cargo test --locked -- --test-threads=1

      - name: Verify packages
        if: steps.discover.outputs.has_unpublished == 'true'
        shell: pwsh
        run: |
          $packageList = "${{ steps.discover.outputs.package_list }}"
          foreach ($name in Get-Content -Path $packageList) {
            cargo publish --dry-run --locked --package $name
          }

      - name: Publish unpublished versions
        if: steps.discover.outputs.has_unpublished == 'true'
        shell: pwsh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if (-not $env:CARGO_REGISTRY_TOKEN) {
            throw "CARGO_REGISTRY_TOKEN secret is not set"
          }

          $packageList = "${{ steps.discover.outputs.package_list }}"
          foreach ($name in Get-Content -Path $packageList) {
            Write-Host "Publishing $name"
            cargo publish --locked --package $name
          }
